name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.2.1)"
        required: true
        type: string

jobs:
  release:
    name: Bump version, tag, and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check release notes exist
        run: |
          if [ ! -f "RELEASE_NOTES.md" ]; then
            echo "::error::RELEASE_NOTES.md not found. Create it before running this workflow."
            exit 1
          fi
          echo "Release notes:"
          cat RELEASE_NOTES.md

      - name: Update manifest.json version
        run: |
          jq --arg v "${{ inputs.version }}" \
            '.version = $v' \
            custom_components/duofern/manifest.json > tmp.json \
            && mv tmp.json custom_components/duofern/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/duofern/manifest.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Create git tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body_path: RELEASE_NOTES.md
